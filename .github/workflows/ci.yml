name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install test runner
        working-directory: /tmp
        run: npm init -y && npm install vitest tsx typescript

      - name: Run tests
        run: /tmp/node_modules/.bin/vitest run
        env:
          NODE_PATH: /tmp/node_modules

  build:
    name: Full Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npx tsc --noEmit
      - run: docker build .
